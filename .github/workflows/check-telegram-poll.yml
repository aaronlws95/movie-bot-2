name: Check Telegram Weekend Poll

on:
  schedule:
    # Runs Tuesday to Friday at 10:00 SGT (02:00 UTC)
    # 2 = Tuesday, 5 = Friday
    - cron: '0 2 * * 2-5'

  workflow_dispatch:

jobs:
  check-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot python-dotenv pytz

      - name: Run Telegram check script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MOVIE_TELEGRAM_ID: ${{ secrets.MOVIE_TELEGRAM_ID }}
        run: |
          python run_telegram_poll.py --check_poll